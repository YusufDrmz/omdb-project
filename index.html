<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineSearch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <span class="logo">CINEMA<span class="logo-accent">SEARCH</span></span>
      <p class="tagline">Every frame has a story.</p>
    </div>
  </header>

  <!-- SEARCH SECTION -->
  <main class="main">
    <section class="search-section">
      <div class="search-wrapper">
        <div class="search-bar">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="text"
            id="movieInput"
            class="search-input"
            placeholder="Search for a film…"
            autocomplete="off"
            autofocus
          />
          <button id="searchBtn" class="search-btn" aria-label="Search">Search</button>
        </div>

        <!-- FILTERS -->
        <div class="filters">
          <label class="filter-label">Type</label>
          <div class="filter-group" id="typeFilter">
            <button class="filter-btn active" data-value="">All</button>
            <button class="filter-btn" data-value="movie">Movie</button>
            <button class="filter-btn" data-value="series">Series</button>
            <button class="filter-btn" data-value="episode">Episode</button>
          </div>

          <label class="filter-label">Year</label>
          <input
            type="number"
            id="yearInput"
            class="year-input"
            placeholder="e.g. 2019"
            min="1888"
            max="2099"
          />
        </div>
      </div>
    </section>

    <!-- RESULT AREA -->
    <section id="result" class="result-section" role="region" aria-live="polite"></section>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>Powered by <a href="https://www.omdbapi.com/" target="_blank" rel="noopener">OMDb API</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
